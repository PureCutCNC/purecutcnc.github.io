  <path d="M17 46h17" stroke="#2f4251" stroke-linecap="round" stroke-width="2" opacity="0.9" />
  <path d="M15 27h16" stroke="#243441" stroke-linecap="round" stroke-width="2" opacity="0.8" />
  <path d="M40 18h7" stroke="#40586a" stroke-linecap="round" stroke-width="2" opacity="0.75" />

  <g filter="url(#shadow)">
